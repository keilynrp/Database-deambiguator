# ── UKIP — Development docker-compose ───────────────────────────────────────
# Development-focused compose file aligned with the production PostgreSQL path.
#
# Quick start:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose logs -f ukip-backend

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ukip
      POSTGRES_USER: ukip
      POSTGRES_PASSWORD: ukip_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ukip -d ukip"]
      interval: 10s
      timeout: 5s
      retries: 5

  ukip-backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:       ${DOCKER_DATABASE_URL:-}
      POSTGRES_HOST:      ${DOCKER_POSTGRES_HOST:-postgres}
      POSTGRES_PORT:      ${DOCKER_POSTGRES_PORT:-5432}
      POSTGRES_DB:        ${DOCKER_POSTGRES_DB:-ukip}
      POSTGRES_USER:      ${DOCKER_POSTGRES_USER:-ukip}
      POSTGRES_PASSWORD:  ${DOCKER_POSTGRES_PASSWORD:-ukip_secret}
      ADMIN_USERNAME:     ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD:     ${ADMIN_PASSWORD:-adminpassword123}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      JWT_SECRET_KEY:     dev_secret_jwt_key
      ENCRYPTION_KEY:     "vRHc0zVcTXbRfUBZEsKNal2lMCfINwDh90EXE8vu2Ew="
      ALLOWED_ORIGINS:    "http://localhost:3004"
      SESSION_SECRET_KEY: dev_session_secret
      LOG_LEVEL:          DEBUG
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - static_files:/app/static
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ukip-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${DOCKER_FRONTEND_API_URL:-http://ukip-backend:8000}
    restart: unless-stopped
    depends_on:
      - ukip-backend
    environment:
      NEXT_PUBLIC_API_URL: ${DOCKER_FRONTEND_API_URL:-http://ukip-backend:8000}
    ports:
      - "3004:3004"
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components

volumes:
  postgres_dev_data:
  static_files:
